server:
  port: 8008
spring:
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    defer-datasource-initialization: true
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
    show-sql: true

  h2:
    console:
      enabled: true
  messages:
    basename: community/messages/common-messages, community/messages/leave-messages, community/messages/people-messages, community/messages/time-messages, community/messages/crm-messages

  liquibase:
    enabled: false

file:
  storage:
    folders:
      - organization-logos
      - user-image
      - leave-attachments
    base: storage
    encryption-key: FileStorageKey12

logging:
  level:
    ROOT: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    enabled: true
    path: /v3/api-docs

jwt:
  access-token:
    signing-key: ajsfjkHJKHKHFKDJsafadsfnkjdhkfhadsHJKHkjsadf
    expiration-time: 3600000 # Expiration time in milliseconds (1 hour)
  refresh-token:
    long-duration:
      expiration-time: 2592000000 # Expiration time in milliseconds (30 days)
    short-duration:
      expiration-time: 21600000 # Expiration time in milliseconds (6 hours)

encryptDecryptAlgorithm:
  secret: EncryptKey123456

app:
  version: 1.0

domain:
  base: localhost
